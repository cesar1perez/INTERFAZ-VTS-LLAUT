<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard Tulancingo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ===== SISTEMA DE TEMAS (RDV style) ===== */
        :root, [data-theme="light"]{
            --bg:#eef2f7; --surface:#ffffff; --surface-2:#f1f5f9; --border:#e2e8f0;
            --text:#0f172a; --muted:#64748b; --navy:#001529; --navy-2:#002d54; --brand:#002d54;
            --accent:#f5b700; --on-accent:#001529; --good:#16a34a; --bad:#dc2626;
            --shadow:0 1px 3px rgba(15,23,42,.08), 0 1px 2px rgba(15,23,42,.04);
        }
        [data-theme="dark"]{
            --bg:#070f1a; --surface:#0d1b2e; --surface-2:#12233b; --border:rgba(255,255,255,.09);
            --text:#e6eef7; --muted:#8aa0b8; --navy:#001019; --navy-2:#00284c; --brand:#7db3ff;
            --accent:#f5b700; --on-accent:#001529; --good:#22c55e; --bad:#f87171;
            --shadow:0 1px 3px rgba(0,0,0,.45);
        }
        *{ -webkit-tap-highlight-color:transparent; }
        body{ font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); transition:background .25s ease,color .25s ease; }

        /* Utilidades temáticas */
        .surface{ background:var(--surface); border:1px solid var(--border); box-shadow:var(--shadow); }
        .surface-2{ background:var(--surface-2); }
        .navy{ background:var(--navy); }
        .navy-grad{ background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%); }
        .txt{ color:var(--text); } .muted{ color:var(--muted); }
        .accent{ color:var(--accent); }
        .chip-accent{ background:var(--accent); color:var(--on-accent); }
        .chip-navy{ background:var(--navy); color:var(--accent); }
        .bd{ border-color:var(--border); }
        .c-good{ color:var(--good); } .c-bad{ color:var(--bad); }
        .bg-good{ background:var(--good); } .bg-bad{ background:var(--bad); }

        .glass-btn{ transition:all .18s ease; cursor:pointer; }
        .glass-btn:active{ transform:scale(.98); }

        /* barras de zona (color acento por índice) */
        .zline-0{ border-left-color:#ef4444 !important; }
        .zline-1{ border-left-color:#3b82f6 !important; }
        .zline-2{ border-left-color:#10b981 !important; }
        .zline-3{ border-left-color:#f59e0b !important; }
        .zline-4{ border-left-color:#8b5cf6 !important; }
        .zline-5{ border-left-color:#ec4899 !important; }

        .dropdown-content{ max-height:0; overflow:hidden; transition:max-height .4s ease-in-out; }
        .dropdown-active .dropdown-content{ max-height:8000px; padding-top:18px; overflow:visible; }

        select.themed{ background:var(--surface-2); color:var(--text); border:1px solid var(--border); }
        select.themed:focus{ outline:2px solid var(--accent); }

        .cmp-cell{ background:var(--surface); border:1px solid var(--border); border-radius:16px; }
        #cmp-results td, #cmp-results th, #cmp-annual td, #cmp-annual th{ white-space:nowrap; }
        .cmp-hi{ box-shadow:0 0 0 2px var(--good) inset; }
        .cmp-lo{ box-shadow:0 0 0 2px var(--bad) inset; }
    </style>
</head>
<body>

    <div id="loader" class="fixed inset-0 navy z-[100] flex flex-col items-center justify-center text-white">
        <div class="w-10 h-10 border-4 border-yellow-400 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-[10px] font-extrabold tracking-widest uppercase" style="color:var(--accent)">Sincronizando Tulancingo...</p>
    </div>

    <header id="main-header" class="hidden navy text-white sticky top-0 z-40 shadow-xl" style="border-bottom:2px solid var(--accent)">
        <div class="max-w-xl mx-auto px-4 py-3">
            <div class="flex justify-between items-center">
                <h2 class="font-extrabold uppercase text-sm tracking-tight" style="color:var(--accent)">DASHBOARD TULANCINGO</h2>
                <button onclick="toggleTheme()" class="w-9 h-9 rounded-xl flex items-center justify-center" style="background:rgba(255,255,255,.1)">
                    <i id="theme-icon" class="fas fa-moon text-sm" style="color:var(--accent)"></i>
                </button>
            </div>
            <p id="update-tag" class="text-[10px] font-bold mt-1" style="color:var(--accent)"></p>
        </div>
    </header>

    <div id="view-cover" class="fixed inset-0 navy-grad z-50 flex flex-col items-center justify-center text-center p-6 text-white">
        <h1 class="text-5xl font-black mb-2 leading-tight uppercase" style="color:var(--accent)">TULANCINGO</h1>
        <p class="text-[9px] tracking-[0.4em] mb-12 uppercase font-bold" style="color:var(--accent)">Unidad de Inteligencia Comercial</p>
        <button onclick="enterApp()" class="glass-btn chip-accent font-black px-12 py-5 rounded-2xl text-xs tracking-widest uppercase shadow-2xl">Ingresar al Sistema</button>
    </div>

    <main class="max-w-xl mx-auto p-4 pb-24"><div id="content-area"></div></main>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRA2Ijt1TI5_APzSJNjdlGF1_Jex0-n3iTiy8R996VR6PNx6V7tM8xO8u3sFKwp2A/pub?gid=1217270027&single=true&output=csv';
        const RDV_URL = 'https://cesar1perez.github.io/RDV/';
        const FORM_LLANTAS = 'https://docs.google.com/forms/d/e/1FAIpQLScb-nqtNToCZvcCkCxaLM6AgRRlz1U1ph0q736pj3QD4LnCrQ/viewform?usp=sharing&ouid=105872250861317126673';
        const FORM_LTH = 'https://docs.google.com/forms/d/e/1FAIpQLSehQdNkm-c_AGAvxMcNZuOINyBn8wU0pwI8XolluIvwCl4rvA/viewform?usp=sharing&ouid=105872250861317126673';
        let db = [];
        const mesesRef = ["ENERO","FEBRERO","MARZO","ABRIL","MAYO","JUNIO","JULIO","AGOSTO","SEPTIEMBRE","OCTUBRE","NOVIEMBRE","DICIEMBRE"];

        const cats = [
            {n:'Total Acumuladores', o:'OBJ ACUMULADORES', r:'REAL ACUMULADORES', color:'#0f172a'},
            {n:'Premium',       o:'OBJ PREMIUM',       r:'REAL PREMIUM',       color:'#1e3a8a'},
            {n:'AGM',           o:'OBJ AGM',           r:'REAL AGM',           color:'#1d4ed8'},
            {n:'Estándar',      o:'OBJ ESTANDAR',      r:'REAL ESTANDAR',      color:'#3b82f6'},
            {n:'Value',         o:'OBJ VALUE',         r:'REAL VALUE',         color:'#0ea5e9'},
            {n:'Lubricantes',   o:'OBJ LUBRICANTES',   r:'REAL LUBRICANTES',   color:'#f97316'},
            {n:'Motobaterías',  o:'OBJ MOTOBATERIAS',  r:'REAL MOTOBATERIAS',  color:'#ef4444'},
            {n:'Filtros',       o:'OBJ FILTROS',       r:'REAL FILTROS',       color:'#16a34a'},
            {n:'Alcalinas',     o:'OBJ ALCALINAS',     r:'REAL ALCALINA',      color:'#9333ea'},
            {n:'Recolecciones', o:'OBJ RECOLECCIONES', r:'REAL RECOLECCIONES', color:'#64748b'}
        ];

        /* ===== TEMA (siempre inicia en light) ===== */
        function toggleTheme(){
            const html = document.documentElement;
            const dark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', dark ? 'light' : 'dark');
            const icon = document.getElementById('theme-icon');
            if(icon) icon.className = 'fas ' + (dark ? 'fa-moon' : 'fa-sun') + ' text-sm';
            // Si estamos en Gráficas, redibuja para actualizar colores al tema
            if(Object.keys(charts).length){ renderGraficas(); }
        }

        async function start() {
            try {
                const response = await fetch(CSV_URL + '&t=' + Date.now());
                const text = await response.text();
                // Fecha de última actualización: intenta el header del Sheet; si no, la hora de sincronización
                let stamp;
                const lm = response.headers.get('last-modified');
                stamp = lm ? new Date(lm) : new Date();
                Papa.parse(text, { header:true, skipEmptyLines:true, complete:(res)=>{
                    // Normaliza texto clave (quita espacios/espacios raros) para que empaten los meses/vendedores
                    const keys = ['MES','AÑO','VENDEDOR','ZONA','SUPERVISOR','TIPO DE VENTA'];
                    db = res.data.map(r=>{ keys.forEach(k=>{ if(k in r) r[k]=norm(r[k]); }); return r; });
                    const fstr = stamp.toLocaleString('es-MX',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
                    document.getElementById('update-tag').innerHTML = `<i class="fas fa-rotate mr-1"></i>Última actualización: ${fstr}`;
                    document.getElementById('loader').classList.add('hidden');
                }});
            } catch (e) { alert("Error de Sincronización Tulancingo"); }
        }

        function enterApp(){
            document.getElementById('view-cover').classList.add('hidden');
            document.getElementById('main-header').classList.remove('hidden');
            renderMainMenu();
        }

        /* ===================== MENÚ PRINCIPAL ===================== */
        function renderMainMenu(){
            let html = `
                <div onclick="renderConcurso()" class="glass-btn p-6 rounded-[2rem] mb-6 shadow-2xl flex items-center gap-4 relative overflow-hidden" style="background:linear-gradient(135deg,#5c2d0c 0%,#b45309 45%,#f59e0b 100%);border:2px solid #fbbf24">
                    <div class="w-16 h-16 rounded-2xl flex items-center justify-center text-3xl shadow-lg shrink-0" style="background:rgba(0,0,0,.35);color:#fbbf24"><i class="fas fa-trophy"></i></div>
                    <div class="min-w-0">
                        <p class="text-[9px] font-black uppercase tracking-[0.25em] mb-0.5" style="color:#fde68a">Concurso LTH Lubricantes</p>
                        <h4 class="text-xl font-black uppercase leading-tight text-white">Crecimiento en Litros</h4>
                        <p class="text-[11px] font-black uppercase tracking-tight" style="color:#fde68a">Julio – Agosto 2026 · Premios Amazon</p>
                    </div>
                </div>

                <p class="text-[12px] font-extrabold muted uppercase tracking-widest mb-6">Seleccione Módulo</p>

                <div onclick="renderPeriods()" class="glass-btn p-7 rounded-[2rem] mb-5 chip-accent shadow-2xl flex items-center gap-5">
                    <div class="navy w-16 h-16 rounded-2xl flex items-center justify-center text-3xl shadow-lg" style="color:var(--accent)"><i class="fas fa-chart-line"></i></div>
                    <div>
                        <h4 class="text-2xl font-black uppercase leading-tight" style="color:var(--navy)">Dashboard Comercial</h4>
                        <p class="text-[10px] font-bold uppercase tracking-tight" style="color:var(--navy-2)">Acumuladores y Líneas Generales</p>
                    </div>
                </div>

                <div onclick="renderComparativo()" class="glass-btn surface p-7 rounded-[2rem] mb-5 flex items-center gap-5">
                    <div class="navy-grad w-16 h-16 rounded-2xl flex items-center justify-center text-3xl shadow-lg" style="color:var(--accent)"><i class="fas fa-code-compare"></i></div>
                    <div>
                        <h4 class="text-2xl font-black uppercase leading-tight txt">Comparativo</h4>
                        <p class="text-[10px] font-bold muted uppercase tracking-tight">Vendedor · Mes vs Mes · Año vs Año</p>
                    </div>
                </div>

                <div onclick="renderGraficas()" class="glass-btn surface p-7 rounded-[2rem] mb-5 flex items-center gap-5">
                    <div class="navy-grad w-16 h-16 rounded-2xl flex items-center justify-center text-3xl shadow-lg" style="color:var(--accent)"><i class="fas fa-chart-pie"></i></div>
                    <div>
                        <h4 class="text-2xl font-black uppercase leading-tight txt">Gráficas & Tendencias</h4>
                        <p class="text-[10px] font-bold muted uppercase tracking-tight">Análisis Visual 2024 · 2025 · 2026</p>
                    </div>
                </div>

                <a href="${RDV_URL}" target="_blank" rel="noopener" class="block no-underline">
                <div class="glass-btn p-7 rounded-[2rem] mb-5 flex items-center gap-5 shadow-2xl" style="background:linear-gradient(135deg,#022c22 0%,#065f46 50%,#0d9488 100%);border:2px solid #2dd4bf">
                    <div class="w-16 h-16 rounded-2xl flex items-center justify-center text-3xl shadow-lg shrink-0" style="background:rgba(0,0,0,.3);color:#5eead4"><i class="fas fa-map-location-dot"></i></div>
                    <div>
                        <h4 class="text-2xl font-black uppercase leading-tight text-white">Reporte Diario de Visitas</h4>
                        <p class="text-[10px] font-bold uppercase tracking-tight flex items-center gap-1" style="color:#99f6e4">Abrir plataforma RDV <i class="fas fa-arrow-up-right-from-square text-[8px]"></i></p>
                    </div>
                </div>
                </a>

                <p class="text-[12px] font-extrabold muted uppercase tracking-widest mt-8 mb-4">Prospección</p>

                <a href="${FORM_LLANTAS}" target="_blank" rel="noopener" class="block no-underline">
                <div class="glass-btn surface p-6 rounded-[1.75rem] mb-4 flex items-center gap-4" style="border-left:6px solid #16a34a">
                    <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-2xl text-white shadow-lg" style="background:#16a34a"><i class="fas fa-file-lines"></i></div>
                    <div>
                        <h4 class="text-lg font-black uppercase leading-tight txt">Form. Prospecto de Llantas</h4>
                        <p class="text-[10px] font-bold muted uppercase tracking-tight flex items-center gap-1">Abrir formulario <i class="fas fa-arrow-up-right-from-square text-[8px]"></i></p>
                    </div>
                </div>
                </a>

                <a href="${FORM_LTH}" target="_blank" rel="noopener" class="block no-underline">
                <div class="glass-btn surface p-6 rounded-[1.75rem] mb-4 flex items-center gap-4" style="border-left:6px solid #dc2626">
                    <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-2xl text-white shadow-lg" style="background:#dc2626"><i class="fas fa-file-lines"></i></div>
                    <div>
                        <h4 class="text-lg font-black uppercase leading-tight txt">Form. Prospecto Clientes LTH</h4>
                        <p class="text-[10px] font-bold muted uppercase tracking-tight flex items-center gap-1">Abrir formulario <i class="fas fa-arrow-up-right-from-square text-[8px]"></i></p>
                    </div>
                </div>
                </a>
            `;
            document.getElementById('content-area').innerHTML = html;
        }

        /* ===================== DASHBOARD COMERCIAL ===================== */
        function renderPeriods(){
            const dataFiltered = db.filter(r => r.MES && (n(r['IMPORTE NETO'])>0 || n(r['REAL ACUMULADORES'])>0));
            const periodos = [...new Set(dataFiltered.map(r => `${r.MES} ${r.AÑO}`))].sort((a,b)=>{
                const [mA,aA]=a.split(' '), [mB,aB]=b.split(' ');
                return aA!==aB ? aB-aA : mesesRef.indexOf(mB)-mesesRef.indexOf(mA);
            });
            let html = `${backBtn("renderMainMenu()","Menú principal")}
                        <p class="text-[10px] font-extrabold muted uppercase tracking-widest mb-4">Comercial / Periodo</p>`;
            periodos.forEach((p,i)=>{
                const isAct = (i===0);
                html += `<div onclick="selectMonth('${p}')" class="glass-btn p-6 rounded-3xl mb-4 flex justify-between items-center ${isAct?'chip-accent':'surface'}">
                    <h4 class="text-xl font-black uppercase" style="color:${isAct?'var(--on-accent)':'var(--text)'}">${p}</h4>
                    <i class="fas fa-chevron-right" style="color:${isAct?'var(--on-accent)':'var(--muted)'}"></i>
                </div>`;
            });
            document.getElementById('content-area').innerHTML = html;
        }

        function selectMonth(p){
            const [m,a]=p.split(' ');
            const data = db.filter(r => r.MES===m && r.AÑO===a && (n(r['IMPORTE NETO'])>0 || n(r['REAL ACUMULADORES'])>0));
            renderZones(data,p);
        }

        function renderZones(data, period){
            const zones = [...new Set(data.map(r => r.ZONA))];
            const totalGral = data.reduce((acc,r)=>acc+n(r['IMPORTE NETO']),0);
            let html = `${backBtn("renderPeriods()","Periodos")}
                <div id="consolidado-main" class="glass-btn navy-grad p-8 rounded-[2.5rem] mb-8 text-white shadow-2xl relative overflow-hidden" style="border:1px solid var(--accent)">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[10px] font-black uppercase tracking-widest" style="color:var(--accent)">Consolidado Tulancingo</span>
                        <button onclick="event.stopPropagation(); toggleDropdown('consolidado-main')" class="bg-white/10 w-10 h-10 rounded-lg flex items-center justify-center"><i class="fas fa-chevron-down text-sm"></i></button>
                    </div>
                    <p class="font-black text-4xl tracking-tight" style="color:var(--accent)">$${f(totalGral)}</p>
                    <div class="dropdown-content">${cats.map(c=>renderProgressItem(data,c)).join('')}</div>
                </div>`;
            zones.forEach((z,i)=>{
                const dZ = data.filter(r=>r.ZONA===z);
                const realZ = dZ.reduce((acc,r)=>acc+n(r['IMPORTE NETO']),0);
                html += `
                <div id="zona-card-${i}" class="surface p-6 rounded-[2rem] mb-5 border-l-[12px] zline-${i%6}">
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex items-center gap-3"><span class="chip-navy w-9 h-9 rounded-full flex items-center justify-center font-black text-xs">#${i+1}</span><h4 class="text-2xl font-black uppercase tracking-tight txt">${z}</h4></div>
                        <div class="flex gap-2">
                             <button onclick="toggleDropdown('zona-card-${i}')" class="surface-2 w-12 h-12 rounded-xl txt flex items-center justify-center"><i class="fas fa-chevron-down text-lg"></i></button>
                             <button onclick="renderSellers('${z}','${period}')" class="navy w-12 h-12 rounded-xl text-white flex items-center justify-center"><i class="fas fa-arrow-right text-lg"></i></button>
                        </div>
                    </div>
                    <div class="surface-2 p-4 rounded-2xl bd border">
                         <p class="text-[10px] font-black muted uppercase mb-1">Venta Neta Zona</p>
                         <p class="text-3xl font-black" style="color:var(--brand)">$${f(realZ)}</p>
                    </div>
                    <div class="dropdown-content">${cats.map(c=>renderProgressItem(dZ,c)).join('')}</div>
                </div>`;
            });
            document.getElementById('content-area').innerHTML = html;
        }

        function renderSellers(z, period){
            const [m,a]=period.split(' ');
            const sellers = db.filter(r => r.ZONA===z && r.MES===m && r.AÑO===a && (n(r['IMPORTE NETO'])>0 || n(r['REAL ACUMULADORES'])>0));
            let html = `${backBtn(`selectMonth('${period}')`,"Zonas")}`;
            sellers.forEach(s=>{
                html += `<div onclick="renderReport('${s.VENDEDOR}','${period}')" class="glass-btn surface p-7 rounded-2xl mb-4 flex justify-between items-center" style="border-left:8px solid var(--navy)">
                    <p class="font-black uppercase text-lg tracking-tight txt">${s.VENDEDOR}</p>
                    <i class="fas fa-chevron-right muted"></i>
                </div>`;
            });
            document.getElementById('content-area').innerHTML = html;
        }

        function renderReport(v, period){
            const [m,a]=period.split(' ');
            const d = db.find(r => r.VENDEDOR===v && r.MES===m && r.AÑO===a);
            renderDetailedReport(v, period, [d], n(d['IMPORTE NETO']), false, d.ZONA);
        }

        function renderDetailedReport(titulo, period, dataArr, totalImporte, isGlobal, zonaNombre=""){
            let html = `
            <div class="flex justify-between items-center mb-6">
                ${backBtn(isGlobal?`selectMonth('${period}')`:`renderSellers('${zonaNombre}','${period}')`,"Regresar")}
                <button onclick="downloadPDF('${titulo}')" class="chip-navy px-5 py-2 rounded-xl text-[10px] font-black shadow-lg uppercase tracking-widest">Descargar PDF</button>
            </div>
            <div id="pdf-container">
                <div class="navy p-10 rounded-t-[2.5rem] text-center" style="border-bottom:4px solid var(--accent)">
                    <p class="font-black text-[10px] uppercase tracking-[0.3em] mb-4" style="color:var(--accent)">${period} ${isGlobal?'':'| '+zonaNombre}</p>
                    <h2 class="text-4xl font-black uppercase text-white leading-none mb-8 tracking-tight">${titulo}</h2>
                    <div class="bg-white/10 p-6 rounded-3xl border border-white/5">
                        <p class="text-[11px] font-bold uppercase mb-1 tracking-widest" style="color:#94a3b8">Importe Neto Facturado</p>
                        <p class="text-5xl font-black text-white tracking-tight">$${f(totalImporte)}</p>
                    </div>
                </div>
                <div class="surface-2 p-5 space-y-5 rounded-b-[2.5rem]">
                    ${cats.map(c=>renderProgressItem(dataArr,c)).join('')}
                    <p class="text-center text-[10px] font-bold muted uppercase mt-8 pb-10 tracking-[0.4em]">Llanterama Tulancingo · Inteligencia</p>
                </div>
            </div>`;
            document.getElementById('content-area').innerHTML = html;
            window.scrollTo(0,0);
        }

        function renderProgressItem(dataArr, c){
            const obj = sum(dataArr,c.o);
            const real = sum(dataArr,c.r);
            const perc = obj>0 ? (real/obj)*100 : (real>0?100:0);
            return `
            <div class="surface p-5 rounded-2xl mb-3">
                <div class="flex justify-between items-start mb-4">
                    <h4 class="text-lg font-black uppercase tracking-tight txt">${c.n}</h4>
                    <div class="chip-navy px-3 py-1.5 rounded-xl font-black text-sm">${Math.round(perc)}%</div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="surface-2 p-4 rounded-xl text-center"><p class="text-[9px] font-black muted uppercase mb-1">Vendido</p><p class="text-2xl font-black txt">${real}</p></div>
                    <div class="navy p-4 rounded-xl text-center"><p class="text-[9px] font-black uppercase mb-1" style="color:var(--accent)">Meta</p><p class="text-2xl font-black" style="color:var(--accent)">${obj}</p></div>
                </div>
                <div class="h-3 rounded-full overflow-hidden mt-4" style="background:var(--surface-2)"><div style="width:${Math.min(perc,100)}%; background:${c.color}" class="h-full rounded-full"></div></div>
            </div>`;
        }

        /* ===================== MÓDULO COMPARATIVO ===================== */
        // Alias globales: mismo vendedor con distintos nombres de captura en la hoja
        const VEND_ALIASES = {
            'MIGUEL':          ['MIGUEL','MIGUEL LOZADA'],
            'RUBEN':           ['RUBEN','RUBEN LEON'],
            'CARLOS CALDERON': ['CARLOS CALDERON','ONESIMO']
        };
        function displayOf(v){ const nv=norm(v); for(const [d,al] of Object.entries(VEND_ALIASES)){ if(al.some(a=>norm(a)===nv)) return d; } return nv; }
        function aliasesOf(v){ const nv=norm(v); for(const al of Object.values(VEND_ALIASES)){ if(al.some(a=>norm(a)===nv)) return al.map(norm); } return [nv]; }
        function rowsOf(v, mes, anio){ const als=aliasesOf(v); return db.filter(r=>als.includes(norm(r.VENDEDOR)) && norm(r.MES)===mes && norm(r.AÑO)===anio); }

        // Solo estos vendedores aparecen en el comparativo (nombres unificados)
        const CMP_VENDEDORES = [
            'CS CD SAHAGUN MAYOREO','CS MAYOREO','CS RIO MAYOREO','TIZAYUCA (CELENE)',
            'CARLOS CALDERON','MIGUEL','RUBEN'
        ].map(norm);

        function renderComparativo(){
            // solo vendedores de la lista permitida, con al menos una fila con venta (agrupados por nombre unificado)
            const withData = db.filter(r => r.VENDEDOR && CMP_VENDEDORES.includes(displayOf(r.VENDEDOR)) && (n(r['IMPORTE NETO'])>0 || n(r['REAL ACUMULADORES'])>0));
            const byZona = {};
            withData.forEach(r=>{ (byZona[r.ZONA]=byZona[r.ZONA]||new Set()).add(displayOf(r.VENDEDOR)); });
            let html = `${backBtn("renderMainMenu()","Menú principal")}
                        <p class="text-[10px] font-extrabold muted uppercase tracking-widest mb-4">Comparativo / Seleccione vendedor</p>`;
            Object.keys(byZona).sort().forEach(z=>{
                html += `<p class="text-[11px] font-black uppercase tracking-widest mt-5 mb-2" style="color:var(--brand)">${z}</p>`;
                [...byZona[z]].sort().forEach(v=>{
                    html += `<div onclick="renderCmpVendedor('${esc(v)}')" class="glass-btn surface p-5 rounded-2xl mb-3 flex justify-between items-center" style="border-left:6px solid var(--accent)">
                        <p class="font-black uppercase text-base tracking-tight txt">${v}</p>
                        <i class="fas fa-code-compare muted"></i>
                    </div>`;
                });
            });
            document.getElementById('content-area').innerHTML = html;
        }

        // TODOS los periodos que existen en la data (no por vendedor) -> siempre aparecen ene-jun 2026
        function allPeriods(){
            return [...new Set(db.filter(r=>r.MES && String(r.MES).trim()!=='' && (n(r['IMPORTE NETO'])>0 || n(r['REAL ACUMULADORES'])>0)).map(r=>`${r.MES} ${r.AÑO}`))]
                .sort((a,b)=>{ const [mA,aA]=a.split(' '),[mB,aB]=b.split(' '); return aA!==aB?aB-aA:mesesRef.indexOf(mB)-mesesRef.indexOf(mA); });
        }
        function shortP(p){ const [m,a]=p.split(' '); return m.slice(0,3)+' '+a; }
        const lineaCorta = {
            'Total Acumuladores':'Acumuladores','Premium':'Premium','AGM':'AGM','Estándar':'Estándar','Value':'Value',
            'Lubricantes':'Lubricantes','Motobaterías':'Motobat.','Filtros':'Filtros','Alcalinas':'Alcalinas','Recolecciones':'Recolec.'
        };

        function renderCmpVendedor(v){
            const periods = allPeriods();
            if(periods.length===0){ document.getElementById('content-area').innerHTML='Sin datos'; return; }
            const defA = periods[0];
            const defB = periods[1] || periods[0];
            const optsA = periods.map(p=>`<option value="${p}" ${p===defA?'selected':''}>${p}</option>`).join('');
            const optsB = periods.map(p=>`<option value="${p}" ${p===defB?'selected':''}>${p}</option>`).join('');

            let html = `
            ${backBtn("renderComparativo()","Cambiar vendedor")}
            <div class="navy p-7 rounded-[2rem] mb-5 text-center" style="border-bottom:4px solid var(--accent)">
                <p class="text-[10px] font-black uppercase tracking-[0.3em] mb-2" style="color:var(--accent)">Comparativo de desempeño</p>
                <h2 class="text-3xl font-black uppercase text-white tracking-tight leading-none">${v}</h2>
            </div>

            <div class="surface p-4 rounded-2xl mb-5">
                <p class="text-[11px] font-black muted uppercase tracking-widest mb-3">Selecciona los meses a comparar</p>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[9px] font-black muted uppercase">Mes A</label>
                        <select id="cmp-a" onchange="updateCmp('${esc(v)}')" class="themed w-full mt-1 p-3 rounded-xl font-black text-sm">${optsA}</select>
                    </div>
                    <div>
                        <label class="text-[9px] font-black muted uppercase">Mes B</label>
                        <select id="cmp-b" onchange="updateCmp('${esc(v)}')" class="themed w-full mt-1 p-3 rounded-xl font-black text-sm">${optsB}</select>
                    </div>
                </div>
            </div>

            <div id="cmp-results"></div>

            <div class="flex items-center justify-between mt-9 mb-3">
                <p class="text-[11px] font-black muted uppercase tracking-widest">Rendimiento por mes / año</p>
                <div class="flex gap-2">
                    <button id="am-imp" onclick="setAnnualMetric('${esc(v)}','imp')" class="chip-accent px-3 py-1.5 rounded-lg text-[10px] font-black uppercase">Importe $</button>
                    <button id="am-acu" onclick="setAnnualMetric('${esc(v)}','acu')" class="surface txt px-3 py-1.5 rounded-lg text-[10px] font-black uppercase">Unidades</button>
                </div>
            </div>
            <div id="cmp-annual"></div>`;
            document.getElementById('content-area').innerHTML = html;
            window.scrollTo(0,0);
            annualMetric = 'imp';
            updateCmp(v);
            renderAnnual(v);
        }

        function getRow(v, periodStr){
            const i = periodStr.lastIndexOf(' ');
            const m = norm(periodStr.slice(0,i)), a = norm(periodStr.slice(i+1));
            const rs = rowsOf(v, m, a);
            if(rs.length===0) return {};
            if(rs.length===1) return rs[0];
            // varios renglones (alias): fusiona sumando numéricos
            const merged = {};
            const numFields = ['IMPORTE NETO', ...cats.map(c=>c.o), ...cats.map(c=>c.r)];
            numFields.forEach(f2=>{ merged[f2] = rs.reduce((s,r)=>s+n(r[f2]),0); });
            return merged;
        }

        function updateCmp(v){
            const pa = document.getElementById('cmp-a').value;
            const pb = document.getElementById('cmp-b').value;
            const ra = getRow(v,pa), rb = getRow(v,pb);
            const impA = n(ra['IMPORTE NETO']), impB = n(rb['IMPORTE NETO']);
            const impD = impA - impB;
            const impCol = impD>0?'var(--good)':(impD<0?'var(--bad)':'var(--muted)');
            const impBg  = impD>0?'rgba(22,163,74,.12)':(impD<0?'rgba(220,38,38,.12)':'var(--surface-2)');
            const impLbl = impD>0?'SUPERÁVIT':(impD<0?'DÉFICIT':'IGUAL');

            let filas = cats.map((c,i)=>{
                const obj = n(ra[c.o]);
                const rA  = n(ra[c.r]);
                const rB  = n(rb[c.r]);
                const d   = rA - rB;
                const dCol = d>0?'var(--good)':(d<0?'var(--bad)':'var(--muted)');
                const rACol = obj>0 ? (rA>=obj?'var(--good)':'var(--bad)') : 'var(--text)';
                const cumpl = obj>0 ? Math.round(rA/obj*100) : null;
                const bg = i%2===0 ? 'var(--surface)' : 'var(--surface-2)';
                return `
                <tr style="background:${bg}">
                    <td class="px-3 py-3 text-[13px] font-black uppercase txt">${lineaCorta[c.n]||c.n}</td>
                    <td class="px-2 py-3 text-center text-sm font-bold muted">${obj||'—'}</td>
                    <td class="px-2 py-3 text-center text-base font-black" style="color:${rACol}">${rA}${cumpl!==null?`<span class="block text-[9px] font-bold" style="color:${rACol}">${cumpl}%</span>`:''}</td>
                    <td class="px-2 py-3 text-center text-base font-black txt">${rB}</td>
                    <td class="px-2 py-3 text-center text-base font-black" style="color:${dCol}">${d>0?'+':''}${d}</td>
                </tr>`;
            }).join('');

            const html = `
            <div class="surface rounded-2xl p-4 mb-4">
                <p class="text-[10px] font-black muted uppercase tracking-widest mb-3 text-center">Importe Neto Total</p>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div class="surface-2 rounded-xl py-3 px-2 text-center min-w-0">
                        <p class="text-[10px] font-black muted uppercase mb-1 truncate">${shortP(pa)}</p>
                        <p class="text-lg sm:text-2xl font-black leading-tight whitespace-nowrap" style="color:var(--brand)">$${f(impA)}</p>
                    </div>
                    <div class="surface-2 rounded-xl py-3 px-2 text-center min-w-0">
                        <p class="text-[10px] font-black muted uppercase mb-1 truncate">${shortP(pb)}</p>
                        <p class="text-lg sm:text-2xl font-black leading-tight whitespace-nowrap" style="color:var(--brand)">$${f(impB)}</p>
                    </div>
                </div>
                <div class="rounded-xl py-3 px-3 flex items-center justify-between" style="background:${impBg}">
                    <p class="text-[11px] font-black uppercase" style="color:${impCol}"><i class="fas fa-${impD>0?'arrow-trend-up':(impD<0?'arrow-trend-down':'minus')} mr-1"></i>${impLbl}</p>
                    <p class="text-xl sm:text-2xl font-black leading-none whitespace-nowrap" style="color:${impCol}">${impD>0?'+':''}$${f(impD)}</p>
                </div>
            </div>

            <div class="surface rounded-2xl overflow-hidden">
                <div class="px-4 pt-4 pb-2 flex items-center justify-between">
                    <p class="text-[11px] font-black txt uppercase tracking-widest">Unidades por línea</p>
                    <p class="text-[9px] font-bold muted uppercase">Real vs Objetivo</p>
                </div>
                <div class="overflow-x-auto">
                <table class="w-full" style="border-collapse:collapse">
                    <thead>
                        <tr class="chip-navy">
                            <th class="px-3 py-2 text-left text-[10px] font-black uppercase">Línea</th>
                            <th class="px-2 py-2 text-center text-[10px] font-black uppercase">Obj</th>
                            <th class="px-2 py-2 text-center text-[10px] font-black uppercase">${shortP(pa)}</th>
                            <th class="px-2 py-2 text-center text-[10px] font-black uppercase">${shortP(pb)}</th>
                            <th class="px-2 py-2 text-center text-[10px] font-black uppercase">A−B</th>
                        </tr>
                    </thead>
                    <tbody>${filas}</tbody>
                </table>
                </div>
                <p class="px-4 py-3 text-[10px] font-bold muted leading-snug" style="border-top:1px solid var(--border)">
                    <span class="c-good">Verde</span> = ${shortP(pa)} vendió más (superávit) · <span class="c-bad">rojo</span> = vendió menos (déficit). El % bajo el real es el cumplimiento vs objetivo.
                </p>
            </div>`;
            document.getElementById('cmp-results').innerHTML = html;
        }

        let annualMetric = 'imp';
        let annualLine = 'REAL ACUMULADORES';
        const uLineas = [
            {k:'REAL ACUMULADORES', o:'OBJ ACUMULADORES', lbl:'Acumuladores'},
            {k:'REAL LUBRICANTES',  o:'OBJ LUBRICANTES',  lbl:'Lubricantes'},
            {k:'REAL MOTOBATERIAS', o:'OBJ MOTOBATERIAS', lbl:'Motobat.'},
            {k:'REAL FILTROS',      o:'OBJ FILTROS',      lbl:'Filtros'}
        ];
        function setAnnualMetric(v, metric){
            annualMetric = metric;
            document.getElementById('am-imp').className = (metric==='imp'?'chip-accent':'surface txt')+' px-3 py-1.5 rounded-lg text-[10px] font-black uppercase';
            document.getElementById('am-acu').className = (metric==='acu'?'chip-accent':'surface txt')+' px-3 py-1.5 rounded-lg text-[10px] font-black uppercase';
            renderAnnual(v);
        }
        function setAnnualLine(v, key){ annualLine = key; renderAnnual(v); }

        function renderAnnual(v){
            const als = aliasesOf(v);
            const mine = db.filter(r=>als.includes(norm(r.VENDEDOR)) && r.MES);
            const years = [...new Set(mine.map(r=>norm(r.AÑO)))].sort((a,b)=>b-a);
            const curr = years[0], prev = years[1];
            const isImp = annualMetric==='imp';
            const linea = uLineas.find(l=>l.k===annualLine) || uLineas[0];
            const field = isImp ? 'IMPORTE NETO' : linea.k;
            const objField = linea.o;
            const val = (mes,anio)=> mine.filter(r=>norm(r.MES)===mes && norm(r.AÑO)===anio).reduce((s,r)=>s+n(r[field]),0);
            const objV = (mes,anio)=> mine.filter(r=>norm(r.MES)===mes && norm(r.AÑO)===anio).reduce((s,r)=>s+n(r[objField]),0);
            const fmt = x => isImp ? '$'+f(x) : f(x);

            // chips de línea (solo en modo unidades)
            const lineChips = isImp ? '' : `
            <div class="flex flex-wrap gap-2 mb-3">
                ${uLineas.map(l=>`<button onclick="setAnnualLine('${esc(v)}','${l.k}')" class="${l.k===annualLine?'chip-navy':'surface-2 txt'} px-3 py-1.5 rounded-lg text-[10px] font-black uppercase">${l.lbl}</button>`).join('')}
            </div>`;

            const rowsData = mesesRef.map(m=>({m, c:val(m,curr), p:prev?val(m,prev):0, o:objV(m,curr)})).filter(x=>x.c>0 || x.p>0);
            const activos = rowsData.filter(x=>x.c>0);
            const maxV = activos.length ? Math.max(...activos.map(x=>x.c)) : -1;
            const minV = activos.length ? Math.min(...activos.map(x=>x.c)) : -1;

            const ytdC = rowsData.reduce((s,x)=>s+x.c,0);
            const ytdP = rowsData.reduce((s,x)=>s+x.p,0);
            const ytdO = rowsData.reduce((s,x)=>s+x.o,0);
            const ytdDiff = ytdC-ytdP;
            const ytdPct = ytdP!==0 ? (ytdDiff/Math.abs(ytdP))*100 : (ytdC!==0?100:0);
            const good = ytdDiff>=0;
            const cumplYTD = (!isImp && ytdO>0) ? Math.round(ytdC/ytdO*100) : null;

            const filas = rowsData.map(x=>{
                const isHi = x.c===maxV && x.c>0;
                const isLo = x.c===minV && x.c>0 && activos.length>1;
                const d = x.c-x.p;
                const pct = x.p!==0 ? Math.round(d/Math.abs(x.p)*100) : (x.c!==0?100:0);
                const dcol = d>=0?'var(--good)':'var(--bad)';
                const rowbg = isHi?'rgba(22,163,74,.12)':(isLo?'rgba(220,38,38,.10)':'transparent');
                const tag = isHi?'<i class="fas fa-star c-good ml-1"></i>':(isLo?'<i class="fas fa-triangle-exclamation c-bad ml-1"></i>':'');
                return `
                <tr style="background:${rowbg};border-top:1px solid var(--border)">
                    <td class="px-3 py-3 text-[13px] font-black uppercase txt">${x.m.slice(0,3)}${tag}</td>
                    <td class="px-2 py-3 text-center text-base font-black txt">${fmt(x.c)}</td>
                    ${prev?`<td class="px-2 py-3 text-center text-sm font-bold muted">${fmt(x.p)}</td>`:''}
                    <td class="px-2 py-3 text-center text-sm font-black" style="color:${dcol}">${d>=0?'+':''}${f(d)}</td>
                    <td class="px-2 py-3 text-center text-[13px] font-black" style="color:${dcol}">${pct>0?'+':''}${pct}%</td>
                </tr>`;
            }).join('');

            const html = `
            ${lineChips}
            <div class="navy-grad p-6 rounded-[2rem] mb-4 text-white">
                <div class="flex justify-between items-center mb-2">
                    <p class="text-[10px] font-black uppercase tracking-widest" style="color:var(--accent)">Acumulado ${curr}${prev?' vs '+prev:''}${isImp?'':' · '+linea.lbl}</p>
                    <span class="px-3 py-1 rounded-lg text-[12px] font-black" style="background:${good?'var(--good)':'var(--bad)'};color:#fff">${ytdPct>0?'+':''}${Math.round(ytdPct)}%</span>
                </div>
                <p class="text-4xl font-black tracking-tight" style="color:var(--accent)">${fmt(ytdC)}</p>
                ${prev?`<p class="text-[12px] font-bold mt-1" style="color:#94a3b8">${prev}: ${fmt(ytdP)} · Diferencia ${ytdDiff>=0?'+':''}${fmt(ytdDiff)}</p>`:''}
                ${cumplYTD!==null?`<p class="text-[12px] font-black mt-1" style="color:var(--accent)">Cumplimiento vs objetivo: ${cumplYTD}% · ${f(ytdC)} de ${f(ytdO)} pzas</p>`:''}
            </div>

            <div class="surface rounded-2xl overflow-hidden mb-4">
                <div class="overflow-x-auto">
                <table class="w-full" style="border-collapse:collapse">
                    <thead>
                        <tr class="chip-navy">
                            <th class="px-3 py-2 text-left text-[10px] font-black uppercase">Mes</th>
                            <th class="px-2 py-2 text-center text-[10px] font-black uppercase">${curr}</th>
                            ${prev?`<th class="px-2 py-2 text-center text-[10px] font-black uppercase">${prev}</th>`:''}
                            <th class="px-2 py-2 text-center text-[10px] font-black uppercase">Dif</th>
                            <th class="px-2 py-2 text-center text-[10px] font-black uppercase">%</th>
                        </tr>
                    </thead>
                    <tbody>${filas}</tbody>
                </table>
                </div>
            </div>
            <p class="text-center text-[10px] font-bold muted uppercase mb-10 tracking-[0.2em]">
                <i class="fas fa-star c-good"></i> Mejor mes &nbsp;·&nbsp; <i class="fas fa-triangle-exclamation c-bad"></i> Mes más bajo
            </p>`;
            document.getElementById('cmp-annual').innerHTML = html;
        }

        /* ===================== MÓDULO GRÁFICAS ===================== */
        let charts = {};
        const grafState = { metric:'imp', year:null, uLine:'REAL ACUMULADORES', vMetric:'imp' };
        const grafLineas = [
            {k:'REAL ACUMULADORES', lbl:'Acumuladores'},
            {k:'REAL LUBRICANTES',  lbl:'Lubricantes'},
            {k:'REAL MOTOBATERIAS', lbl:'Motobat.'},
            {k:'REAL FILTROS',      lbl:'Filtros'}
        ];
        const ZONAS_GRAF = ['TULANCINGO','CS RIO DE LAS AVENIDAS','CS COLOSIO','CS TIZAYUCA','CD SAHAGUN'];
        const familias = [
            {name:'Acumuladores', r:'REAL ACUMULADORES', color:'#1d4ed8'},
            {name:'Lubricantes',  r:'REAL LUBRICANTES',  color:'#f97316'},
            {name:'Motobaterías', r:'REAL MOTOBATERIAS', color:'#ef4444'},
            {name:'Filtros',      r:'REAL FILTROS',      color:'#16a34a'},
            {name:'Alcalinas',    r:'REAL ALCALINA',     color:'#9333ea'},
            {name:'Recolecciones',r:'REAL RECOLECCIONES',color:'#64748b'}
        ];
        const yearColor = { '2024':'#94a3b8', '2025':'#1d4ed8', '2026':'#f5b700' };

        function yearsInData(){
            return [...new Set(db.filter(r=>r.MES && (n(r['IMPORTE NETO'])>0||n(r['REAL ACUMULADORES'])>0)).map(r=>norm(r.AÑO)))].filter(Boolean).sort();
        }
        function monthlySeries(field){
            const out={};
            yearsInData().forEach(y=>{
                out[y]=mesesRef.map(m=>db.filter(r=>norm(r.AÑO)===y && norm(r.MES)===m).reduce((s,r)=>s+n(r[field]),0));
            });
            return out;
        }
        function familyTotals(year){
            return familias.map(fm=>({ name:fm.name, color:fm.color, val:db.filter(r=>norm(r.AÑO)===year).reduce((s,r)=>s+n(r[fm.r]),0) }));
        }
        function vendorTotals(year, field){
            const map={};
            db.filter(r=>norm(r.AÑO)===year && r.VENDEDOR).forEach(r=>{ const v=displayOf(r.VENDEDOR); map[v]=(map[v]||0)+n(r[field]); });
            return Object.entries(map).map(([name,val])=>({name,val})).filter(x=>x.val>0).sort((a,b)=>b.val-a.val).slice(0,10);
        }
        function zonaSeries(){
            // importe neto anual por zona, para cada año
            const out={};
            yearsInData().forEach(y=>{
                out[y]=ZONAS_GRAF.map(z=>db.filter(r=>norm(r.AÑO)===y && norm(r.ZONA)===z).reduce((s,r)=>s+n(r['IMPORTE NETO']),0));
            });
            return out;
        }
        function destroyCharts(){ Object.values(charts).forEach(c=>{ try{c.destroy();}catch(e){} }); charts={}; }
        function themeColors(){
            const cs=getComputedStyle(document.documentElement);
            return { txt:cs.getPropertyValue('--text').trim(), grid:cs.getPropertyValue('--border').trim(), muted:cs.getPropertyValue('--muted').trim() };
        }

        function setGrafMetric(m){ grafState.metric=m; renderGraficas(); }
        function setGrafYear(y){ grafState.year=y; renderGraficas(); }
        function setGrafULine(k){ grafState.uLine=k; renderGraficas(); }
        function setGrafVMetric(k){ grafState.vMetric=k; renderGraficas(); }

        function renderGraficas(){
            const years=yearsInData();
            if(years.length===0){ document.getElementById('content-area').innerHTML='Sin datos'; return; }
            if(!grafState.year || !years.includes(grafState.year)) grafState.year=years[years.length-1];
            const isImp = grafState.metric==='imp';
            const yr = grafState.year;
            const uLbl = (grafLineas.find(l=>l.k===grafState.uLine)||grafLineas[0]).lbl;
            const vIsImp = grafState.vMetric==='imp';
            const vLbl = vIsImp ? 'Importe' : (grafLineas.find(l=>l.k===grafState.vMetric)||{}).lbl;

            const yearOpts = years.slice().reverse().map(y=>`<option value="${y}" ${y===yr?'selected':''}>${y}</option>`).join('');
            const uChips = isImp ? '' : `
                <div class="flex flex-wrap gap-2 mb-2">
                    ${grafLineas.map(l=>`<button onclick="setGrafULine('${l.k}')" class="${l.k===grafState.uLine?'chip-navy':'surface-2 txt'} px-3 py-1.5 rounded-lg text-[10px] font-black uppercase">${l.lbl}</button>`).join('')}
                </div>`;
            const vChips = `
                <div class="flex flex-wrap gap-2 mb-2">
                    <button onclick="setGrafVMetric('imp')" class="${vIsImp?'chip-accent':'surface-2 txt'} px-3 py-1.5 rounded-lg text-[10px] font-black uppercase">Importe $</button>
                    ${grafLineas.map(l=>`<button onclick="setGrafVMetric('${l.k}')" class="${l.k===grafState.vMetric?'chip-navy':'surface-2 txt'} px-3 py-1.5 rounded-lg text-[10px] font-black uppercase">${l.lbl}</button>`).join('')}
                </div>`;

        function buildCharts(){

        /* ===================== MÓDULO CONCURSO LUBRICANTES ===================== */
        // display: nombre a mostrar | aliases: variantes de VENDEDOR (col. F) que corresponden a la misma persona
        const CONCURSO_VEND = [
            {display:'CARLOS CALDERON',      aliases:['CARLOS CALDERON','ONESIMO']},
            {display:'MIGUEL',               aliases:['MIGUEL','MIGUEL LOZADA']},

            {display:'CS RIO MAYOREO',       aliases:['CS RIO MAYOREO']},
            {display:'TIZAYUCA (CELENE)',    aliases:['TIZAYUCA (CELENE)']},
            {display:'CS CD SAHAGUN MAYOREO',aliases:['CS CD SAHAGUN MAYOREO']}
        ];

        function lubOf(aliases, mes){
            const rs = db.filter(x=>aliases.some(a=>norm(x.VENDEDOR)===norm(a)) && norm(x.MES)===mes && norm(x.AÑO)==='2026');
            if(rs.length===0) return {has:false, val:0};
            return {has:true, val:rs.reduce((s,r)=>s+n(r['REAL LUBRICANTES']),0)};
        }
        function objLubActual(aliases){
            // objetivo mensual de lubricante del mes más reciente capturado en 2026
            for(let i=mesesRef.length-1;i>=0;i--){
                const rs = db.filter(x=>aliases.some(a=>norm(x.VENDEDOR)===norm(a)) && norm(x.MES)===mesesRef[i] && norm(x.AÑO)==='2026');
                if(rs.length){ const o=rs.reduce((s,r)=>s+n(r['OBJ LUBRICANTES']),0); if(o>0) return o; }
            }
            return 0;
        }
        function objLubDe(aliases, mes){
            const rs = db.filter(x=>aliases.some(a=>norm(x.VENDEDOR)===norm(a)) && norm(x.MES)===mes && norm(x.AÑO)==='2026');
            if(rs.length===0) return {has:false, val:0};
            return {has:true, val:rs.reduce((s,r)=>s+n(r['OBJ LUBRICANTES']),0)};
        }
        function concursoData(){
            const rows = CONCURSO_VEND.map(({display,aliases})=>{
                const v=display;
                const mar=lubOf(aliases,'MARZO'), abr=lubOf(aliases,'ABRIL');
                const jul=lubOf(aliases,'JULIO'), ago=lubOf(aliases,'AGOSTO');
                const oMar=objLubDe(aliases,'MARZO'), oAbr=objLubDe(aliases,'ABRIL');
                const oJul=objLubDe(aliases,'JULIO'), oAgo=objLubDe(aliases,'AGOSTO');
                const objMes = objLubActual(aliases);
                // BASE: total litros mar+abr vs suma de objetivos mar+abr
                const baseTot = [mar,abr].filter(x=>x.has).reduce((s,x)=>s+x.val,0);
                const baseObj = [oMar,oAbr].filter(x=>x.has).reduce((s,x)=>s+x.val,0);
                const pctBase = baseObj>0 ? (baseTot/baseObj*100) : 0;
                // CONCURSO: total litros jul+ago vs suma de objetivos jul+ago
                const compTot = [jul,ago].filter(x=>x.has).reduce((s,x)=>s+x.val,0);
                const compObj = [oJul,oAgo].filter(x=>x.has).reduce((s,x)=>s+x.val,0);
                const hasComp = jul.has || ago.has;
                const pctComp = (hasComp && compObj>0) ? (compTot/compObj*100) : null;
                // GANADOR: avance en puntos porcentuales de cumplimiento (concurso - base)
                const crecPts = (pctComp!==null) ? (pctComp - pctBase) : null;
                return {v,mar,abr,jul,ago,objMes,baseTot,baseObj,pctBase,compTot,compObj,pctComp,hasComp,crecPts};
            });
            // ranking: primero los que ya tienen jul/ago, por mayor avance en puntos de cumplimiento
            const conComp = rows.filter(r=>r.crecPts!==null).sort((a,b)=>b.crecPts-a.crecPts);
            conComp.forEach((r,i)=>r.pos=i+1);
            return rows;
        }

            <div class="rounded-2xl p-5 mb-5 text-white" style="background:linear-gradient(135deg,#065f46,#16a34a)">
                <p class="text-[10px] font-black uppercase tracking-widest mb-1" style="color:#bbf7d0">Puntero actual</p>
                <p class="text-2xl font-black uppercase leading-none">${lider.v}</p>
                <p class="text-[13px] font-bold mt-1" style="color:#bbf7d0">${lider.crecPts>=0?'+':''}${lider.crecPts.toFixed(1)} pts de avance · ${Math.round(lider.pctBase)}% base → ${Math.round(lider.pctComp)}% concurso</p>
            </div>` : `
            <div class="surface rounded-2xl p-4 mb-5 flex items-center gap-3" style="border-left:6px solid #b45309">
                <i class="fas fa-hourglass-half text-xl" style="color:#b45309"></i>
                <p class="text-[12px] muted leading-snug"><b class="txt">El concurso arranca con el % de cumplimiento base de marzo–abril.</b> Los litros y objetivos de julio y agosto aparecerán automáticamente aquí conforme se capturen en el sistema.</p>
            </div>`}

            <p class="text-[11px] font-black muted uppercase tracking-widest mb-3">Registro de progreso · Litros de lubricante</p>
            ${cards}

            <p class="text-center text-[10px] font-bold muted mt-4 mb-10 leading-snug">Los litros de Julio y Agosto se actualizan solos al capturarlos en el Google Sheet.<br>Llanterama Tulancingo · Concurso LTH Lubricantes</p>`;
            document.getElementById('content-area').innerHTML = html;
            window.scrollTo(0,0);
        }

        /* ===================== HELPERS ===================== */
        // Botón de regreso: flecha grande en círculo, fácil de identificar
        function backBtn(action, label){
            return `<button onclick="${action}" class="glass-btn mb-6 flex items-center gap-3">
                <span class="w-12 h-12 rounded-full navy flex items-center justify-center shadow-lg shrink-0" style="color:var(--accent);border:2px solid var(--accent)"><i class="fas fa-arrow-left text-xl"></i></span>
                <span class="text-[11px] font-black muted uppercase tracking-widest">${label}</span>
            </button>`;
        }
        function n(v){ if(!v) return 0; const clean=String(v).replace(/[$,]/g,"").trim(); return parseFloat(clean)||0; }
        function norm(x){ return String(x==null?'':x).replace(/\u00A0/g,' ').replace(/\s+/g,' ').trim(); }
        function f(v){ return Math.round(v).toLocaleString('es-MX'); }
        function esc(s){ return String(s).replace(/'/g,"\\'"); }
        function sum(dataArr, field){ if(!field) return 0; return dataArr.reduce((acc,r)=>acc+Math.round(n(r[field])),0); }
        function toggleDropdown(id){ document.getElementById(id).classList.toggle('dropdown-active'); }
        function downloadPDF(name){
            const element = document.getElementById('pdf-container');
            html2pdf().set({ margin:[10,5,10,5], filename:`TUL_${name}.pdf`, html2canvas:{scale:2}, jsPDF:{unit:'mm',format:'a4'} }).from(element).save();
        }

        start();
    </script>
</body>
</html>
