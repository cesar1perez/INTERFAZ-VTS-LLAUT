<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard Tulancingo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ===== SISTEMA DE TEMAS (RDV style) ===== */
        :root, [data-theme="light"]{
            --bg:#eef2f7; --surface:#ffffff; --surface-2:#f1f5f9; --border:#e2e8f0;
            --text:#0f172a; --muted:#64748b; --navy:#001529; --navy-2:#002d54;
            --accent:#f5b700; --on-accent:#001529; --good:#16a34a; --bad:#dc2626;
            --shadow:0 1px 3px rgba(15,23,42,.08), 0 1px 2px rgba(15,23,42,.04);
        }
        [data-theme="dark"]{
            --bg:#070f1a; --surface:#0d1b2e; --surface-2:#12233b; --border:rgba(255,255,255,.09);
            --text:#e6eef7; --muted:#8aa0b8; --navy:#001019; --navy-2:#00284c;
            --accent:#f5b700; --on-accent:#001529; --good:#22c55e; --bad:#f87171;
            --shadow:0 1px 3px rgba(0,0,0,.45);
        }
        *{ -webkit-tap-highlight-color:transparent; }
        body{ font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); transition:background .25s ease,color .25s ease; }

        /* Utilidades temáticas */
        .surface{ background:var(--surface); border:1px solid var(--border); box-shadow:var(--shadow); }
        .surface-2{ background:var(--surface-2); }
        .navy{ background:var(--navy); }
        .navy-grad{ background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%); }
        .txt{ color:var(--text); } .muted{ color:var(--muted); }
        .accent{ color:var(--accent); }
        .chip-accent{ background:var(--accent); color:var(--on-accent); }
        .chip-navy{ background:var(--navy); color:var(--accent); }
        .bd{ border-color:var(--border); }
        .c-good{ color:var(--good); } .c-bad{ color:var(--bad); }
        .bg-good{ background:var(--good); } .bg-bad{ background:var(--bad); }

        .glass-btn{ transition:all .18s ease; cursor:pointer; }
        .glass-btn:active{ transform:scale(.98); }

        /* barras de zona (color acento por índice) */
        .zline-0{ border-left-color:#ef4444 !important; }
        .zline-1{ border-left-color:#3b82f6 !important; }
        .zline-2{ border-left-color:#10b981 !important; }
        .zline-3{ border-left-color:#f59e0b !important; }
        .zline-4{ border-left-color:#8b5cf6 !important; }
        .zline-5{ border-left-color:#ec4899 !important; }

        .dropdown-content{ max-height:0; overflow:hidden; transition:max-height .4s ease-in-out; }
        .dropdown-active .dropdown-content{ max-height:8000px; padding-top:18px; overflow:visible; }

        select.themed{ background:var(--surface-2); color:var(--text); border:1px solid var(--border); }
        select.themed:focus{ outline:2px solid var(--accent); }

        .cmp-cell{ background:var(--surface); border:1px solid var(--border); border-radius:16px; }
        .cmp-hi{ box-shadow:0 0 0 2px var(--good) inset; }
        .cmp-lo{ box-shadow:0 0 0 2px var(--bad) inset; }
    </style>
</head>
<body>

    <div id="loader" class="fixed inset-0 navy z-[100] flex flex-col items-center justify-center text-white">
        <div class="w-10 h-10 border-4 border-yellow-400 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-[10px] font-extrabold tracking-widest uppercase" style="color:var(--accent)">Sincronizando Tulancingo...</p>
    </div>

    <header id="main-header" class="hidden navy text-white sticky top-0 z-40 shadow-xl" style="border-bottom:2px solid var(--accent)">
        <div class="max-w-xl mx-auto p-4 flex justify-between items-center">
            <h2 class="font-extrabold uppercase text-sm tracking-tight" style="color:var(--accent)">DASHBOARD TULANCINGO</h2>
            <div class="flex items-center gap-3">
                <p id="update-tag" class="text-[8px] font-bold uppercase" style="color:var(--accent)"></p>
                <button onclick="toggleTheme()" class="w-9 h-9 rounded-xl flex items-center justify-center" style="background:rgba(255,255,255,.1)">
                    <i id="theme-icon" class="fas fa-moon text-sm" style="color:var(--accent)"></i>
                </button>
            </div>
        </div>
    </header>

    <div id="view-cover" class="fixed inset-0 navy-grad z-50 flex flex-col items-center justify-center text-center p-6 text-white">
        <h1 class="text-5xl font-black mb-2 leading-tight uppercase" style="color:var(--accent)">TULANCINGO</h1>
        <p class="text-[9px] tracking-[0.4em] mb-12 uppercase font-bold" style="color:var(--accent)">Unidad de Inteligencia Comercial</p>
        <button onclick="enterApp()" class="glass-btn chip-accent font-black px-12 py-5 rounded-2xl text-xs tracking-widest uppercase shadow-2xl">Ingresar al Sistema</button>
    </div>

    <main class="max-w-xl mx-auto p-4 pb-24"><div id="content-area"></div></main>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRA2Ijt1TI5_APzSJNjdlGF1_Jex0-n3iTiy8R996VR6PNx6V7tM8xO8u3sFKwp2A/pub?gid=1217270027&single=true&output=csv';
        const RDV_URL = 'https://cesar1perez.github.io/RDV/';
        let db = [];
        const mesesRef = ["ENERO","FEBRERO","MARZO","ABRIL","MAYO","JUNIO","JULIO","AGOSTO","SEPTIEMBRE","OCTUBRE","NOVIEMBRE","DICIEMBRE"];

        const cats = [
            {n:'Total Acumuladores', o:'OBJ ACUMULADORES', r:'REAL ACUMULADORES', color:'#0f172a'},
            {n:'Premium',       o:'OBJ PREMIUM',       r:'REAL PREMIUM',       color:'#1e3a8a'},
            {n:'AGM',           o:'OBJ AGM',           r:'REAL AGM',           color:'#1d4ed8'},
            {n:'Estándar',      o:'OBJ ESTANDAR',      r:'REAL ESTANDAR',      color:'#3b82f6'},
            {n:'Value',         o:'OBJ VALUE',         r:'REAL VALUE',         color:'#0ea5e9'},
            {n:'Lubricantes',   o:'OBJ LUBRICANTES',   r:'REAL LUBRICANTES',   color:'#f97316'},
            {n:'Motobaterías',  o:'OBJ MOTOBATERIAS',  r:'REAL MOTOBATERIAS',  color:'#ef4444'},
            {n:'Filtros',       o:'OBJ FILTROS',       r:'REAL FILTROS',       color:'#16a34a'},
            {n:'Alcalinas',     o:'OBJ ALCALINAS',     r:'REAL ALCALINA',      color:'#9333ea'},
            {n:'Recolecciones', o:'OBJ RECOLECCIONES', r:'REAL RECOLECCIONES', color:'#64748b'}
        ];

        /* ===== TEMA (siempre inicia en light) ===== */
        function toggleTheme(){
            const html = document.documentElement;
            const dark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', dark ? 'light' : 'dark');
            const icon = document.getElementById('theme-icon');
            if(icon) icon.className = 'fas ' + (dark ? 'fa-moon' : 'fa-sun') + ' text-sm';
        }

        async function start() {
            try {
                const response = await fetch(CSV_URL + '&t=' + Date.now());
                const text = await response.text();
                Papa.parse(text, { header:true, skipEmptyLines:true, complete:(res)=>{
                    db = res.data;
                    document.getElementById('update-tag').innerText = `LIVE: ${new Date().toLocaleTimeString()}`;
                    document.getElementById('loader').classList.add('hidden');
                }});
            } catch (e) { alert("Error de Sincronización Tulancingo"); }
        }

        function enterApp(){
            document.getElementById('view-cover').classList.add('hidden');
            document.getElementById('main-header').classList.remove('hidden');
            renderMainMenu();
        }

        /* ===================== MENÚ PRINCIPAL ===================== */
        function renderMainMenu(){
            let html = `
                <p class="text-[12px] font-extrabold muted uppercase tracking-widest mb-6">Seleccione Módulo</p>

                <div onclick="renderPeriods()" class="glass-btn p-7 rounded-[2rem] mb-5 chip-accent shadow-2xl flex items-center gap-5">
                    <div class="navy w-16 h-16 rounded-2xl flex items-center justify-center text-3xl shadow-lg" style="color:var(--accent)"><i class="fas fa-chart-line"></i></div>
                    <div>
                        <h4 class="text-2xl font-black uppercase leading-tight" style="color:var(--navy)">Dashboard Comercial</h4>
                        <p class="text-[10px] font-bold uppercase tracking-tight" style="color:var(--navy-2)">Acumuladores y Líneas Generales</p>
                    </div>
                </div>

                <div onclick="renderComparativo()" class="glass-btn surface p-7 rounded-[2rem] mb-5 flex items-center gap-5">
                    <div class="navy-grad w-16 h-16 rounded-2xl flex items-center justify-center text-3xl shadow-lg" style="color:var(--accent)"><i class="fas fa-code-compare"></i></div>
                    <div>
                        <h4 class="text-2xl font-black uppercase leading-tight txt">Comparativo</h4>
                        <p class="text-[10px] font-bold muted uppercase tracking-tight">Vendedor · Mes vs Mes · Año vs Año</p>
                    </div>
                </div>

                <a href="${RDV_URL}" target="_blank" rel="noopener" class="block no-underline">
                <div class="glass-btn surface p-7 rounded-[2rem] mb-5 flex items-center gap-5" style="border-left:6px solid var(--accent)">
                    <div class="navy w-16 h-16 rounded-2xl flex items-center justify-center text-3xl shadow-lg text-white"><i class="fas fa-map-location-dot"></i></div>
                    <div>
                        <h4 class="text-2xl font-black uppercase leading-tight txt">Reporte Diario de Visitas</h4>
                        <p class="text-[10px] font-bold muted uppercase tracking-tight flex items-center gap-1">Abrir plataforma RDV <i class="fas fa-arrow-up-right-from-square text-[8px]"></i></p>
                    </div>
                </div>
                </a>
            `;
            document.getElementById('content-area').innerHTML = html;
        }

        /* ===================== DASHBOARD COMERCIAL ===================== */
        function renderPeriods(){
            const dataFiltered = db.filter(r => r.MES && (n(r['IMPORTE NETO'])>0 || n(r['REAL ACUMULADORES'])>0));
            const periodos = [...new Set(dataFiltered.map(r => `${r.MES} ${r.AÑO}`))].sort((a,b)=>{
                const [mA,aA]=a.split(' '), [mB,aB]=b.split(' ');
                return aA!==aB ? aB-aA : mesesRef.indexOf(mB)-mesesRef.indexOf(mA);
            });
            let html = `<button onclick="renderMainMenu()" class="mb-6 text-[10px] font-extrabold muted uppercase tracking-widest">← Volver al menú</button>
                        <p class="text-[10px] font-extrabold muted uppercase tracking-widest mb-4">Comercial / Periodo</p>`;
            periodos.forEach((p,i)=>{
                const isAct = (i===0);
                html += `<div onclick="selectMonth('${p}')" class="glass-btn p-6 rounded-3xl mb-4 flex justify-between items-center ${isAct?'chip-accent':'surface'}">
                    <h4 class="text-xl font-black uppercase" style="color:${isAct?'var(--on-accent)':'var(--text)'}">${p}</h4>
                    <i class="fas fa-chevron-right" style="color:${isAct?'var(--on-accent)':'var(--muted)'}"></i>
                </div>`;
            });
            document.getElementById('content-area').innerHTML = html;
        }

        function selectMonth(p){
            const [m,a]=p.split(' ');
            const data = db.filter(r => r.MES===m && r.AÑO===a && (n(r['IMPORTE NETO'])>0 || n(r['REAL ACUMULADORES'])>0));
            renderZones(data,p);
        }

        function renderZones(data, period){
            const zones = [...new Set(data.map(r => r.ZONA))];
            const totalGral = data.reduce((acc,r)=>acc+n(r['IMPORTE NETO']),0);
            let html = `<button onclick="renderPeriods()" class="glass-btn mb-6 text-[10px] font-extrabold surface px-6 py-2 rounded-full uppercase txt">← Volver a periodos</button>
                <div id="consolidado-main" class="glass-btn navy-grad p-8 rounded-[2.5rem] mb-8 text-white shadow-2xl relative overflow-hidden" style="border:1px solid var(--accent)">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[10px] font-black uppercase tracking-widest" style="color:var(--accent)">Consolidado Tulancingo</span>
                        <button onclick="event.stopPropagation(); toggleDropdown('consolidado-main')" class="bg-white/10 w-10 h-10 rounded-lg flex items-center justify-center"><i class="fas fa-chevron-down text-sm"></i></button>
                    </div>
                    <p class="font-black text-4xl tracking-tight" style="color:var(--accent)">$${f(totalGral)}</p>
                    <div class="dropdown-content">${cats.map(c=>renderProgressItem(data,c)).join('')}</div>
                </div>`;
            zones.forEach((z,i)=>{
                const dZ = data.filter(r=>r.ZONA===z);
                const realZ = dZ.reduce((acc,r)=>acc+n(r['IMPORTE NETO']),0);
                html += `
                <div id="zona-card-${i}" class="surface p-6 rounded-[2rem] mb-5 border-l-[12px] zline-${i%6}">
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex items-center gap-3"><span class="chip-navy w-9 h-9 rounded-full flex items-center justify-center font-black text-xs">#${i+1}</span><h4 class="text-2xl font-black uppercase tracking-tight txt">${z}</h4></div>
                        <div class="flex gap-2">
                             <button onclick="toggleDropdown('zona-card-${i}')" class="surface-2 w-12 h-12 rounded-xl txt flex items-center justify-center"><i class="fas fa-chevron-down text-lg"></i></button>
                             <button onclick="renderSellers('${z}','${period}')" class="navy w-12 h-12 rounded-xl text-white flex items-center justify-center"><i class="fas fa-arrow-right text-lg"></i></button>
                        </div>
                    </div>
                    <div class="surface-2 p-4 rounded-2xl bd border">
                         <p class="text-[10px] font-black muted uppercase mb-1">Venta Neta Zona</p>
                         <p class="text-3xl font-black accent" style="color:var(--navy-2)">$${f(realZ)}</p>
                    </div>
                    <div class="dropdown-content">${cats.map(c=>renderProgressItem(dZ,c)).join('')}</div>
                </div>`;
            });
            document.getElementById('content-area').innerHTML = html;
        }

        function renderSellers(z, period){
            const [m,a]=period.split(' ');
            const sellers = db.filter(r => r.ZONA===z && r.MES===m && r.AÑO===a && (n(r['IMPORTE NETO'])>0 || n(r['REAL ACUMULADORES'])>0));
            let html = `<button onclick="selectMonth('${period}')" class="glass-btn mb-6 text-[10px] font-extrabold surface px-6 py-2 rounded-full uppercase txt">← Volver a zonas</button>`;
            sellers.forEach(s=>{
                html += `<div onclick="renderReport('${s.VENDEDOR}','${period}')" class="glass-btn surface p-7 rounded-2xl mb-4 flex justify-between items-center" style="border-left:8px solid var(--navy)">
                    <p class="font-black uppercase text-lg tracking-tight txt">${s.VENDEDOR}</p>
                    <i class="fas fa-chevron-right muted"></i>
                </div>`;
            });
            document.getElementById('content-area').innerHTML = html;
        }

        function renderReport(v, period){
            const [m,a]=period.split(' ');
            const d = db.find(r => r.VENDEDOR===v && r.MES===m && r.AÑO===a);
            renderDetailedReport(v, period, [d], n(d['IMPORTE NETO']), false, d.ZONA);
        }

        function renderDetailedReport(titulo, period, dataArr, totalImporte, isGlobal, zonaNombre=""){
            let html = `
            <div class="flex justify-between items-center mb-6">
                <button onclick="${isGlobal?`selectMonth('${period}')`:`renderSellers('${zonaNombre}','${period}')`}" class="text-[11px] font-extrabold muted uppercase tracking-widest">← Regresar</button>
                <button onclick="downloadPDF('${titulo}')" class="chip-navy px-5 py-2 rounded-xl text-[10px] font-black shadow-lg uppercase tracking-widest">Descargar PDF</button>
            </div>
            <div id="pdf-container">
                <div class="navy p-10 rounded-t-[2.5rem] text-center" style="border-bottom:4px solid var(--accent)">
                    <p class="font-black text-[10px] uppercase tracking-[0.3em] mb-4" style="color:var(--accent)">${period} ${isGlobal?'':'| '+zonaNombre}</p>
                    <h2 class="text-4xl font-black uppercase text-white leading-none mb-8 tracking-tight">${titulo}</h2>
                    <div class="bg-white/10 p-6 rounded-3xl border border-white/5">
                        <p class="text-[11px] font-bold uppercase mb-1 tracking-widest" style="color:#94a3b8">Importe Neto Facturado</p>
                        <p class="text-5xl font-black text-white tracking-tight">$${f(totalImporte)}</p>
                    </div>
                </div>
                <div class="surface-2 p-5 space-y-5 rounded-b-[2.5rem]">
                    ${cats.map(c=>renderProgressItem(dataArr,c)).join('')}
                    <p class="text-center text-[10px] font-bold muted uppercase mt-8 pb-10 tracking-[0.4em]">Llanterama Tulancingo · Inteligencia</p>
                </div>
            </div>`;
            document.getElementById('content-area').innerHTML = html;
            window.scrollTo(0,0);
        }

        function renderProgressItem(dataArr, c){
            const obj = sum(dataArr,c.o);
            const real = sum(dataArr,c.r);
            const perc = obj>0 ? (real/obj)*100 : (real>0?100:0);
            return `
            <div class="surface p-5 rounded-2xl mb-3">
                <div class="flex justify-between items-start mb-4">
                    <h4 class="text-lg font-black uppercase tracking-tight txt">${c.n}</h4>
                    <div class="chip-navy px-3 py-1.5 rounded-xl font-black text-sm">${Math.round(perc)}%</div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="surface-2 p-4 rounded-xl text-center"><p class="text-[9px] font-black muted uppercase mb-1">Vendido</p><p class="text-2xl font-black txt">${real}</p></div>
                    <div class="navy p-4 rounded-xl text-center"><p class="text-[9px] font-black uppercase mb-1" style="color:var(--accent)">Meta</p><p class="text-2xl font-black" style="color:var(--accent)">${obj}</p></div>
                </div>
                <div class="h-3 rounded-full overflow-hidden mt-4" style="background:var(--surface-2)"><div style="width:${Math.min(perc,100)}%; background:${c.color}" class="h-full rounded-full"></div></div>
            </div>`;
        }

        /* ===================== MÓDULO COMPARATIVO ===================== */
        function renderComparativo(){
            // vendedores con al menos una fila con venta
            const withData = db.filter(r => r.VENDEDOR && r.VENDEDOR.trim()!=='' && (n(r['IMPORTE NETO'])>0 || n(r['REAL ACUMULADORES'])>0));
            const byZona = {};
            withData.forEach(r=>{ (byZona[r.ZONA]=byZona[r.ZONA]||new Set()).add(r.VENDEDOR); });
            let html = `<button onclick="renderMainMenu()" class="mb-6 text-[10px] font-extrabold muted uppercase tracking-widest">← Volver al menú</button>
                        <p class="text-[10px] font-extrabold muted uppercase tracking-widest mb-4">Comparativo / Seleccione vendedor</p>`;
            Object.keys(byZona).sort().forEach(z=>{
                html += `<p class="text-[11px] font-black uppercase tracking-widest mt-5 mb-2 accent" style="color:var(--navy-2)">${z}</p>`;
                [...byZona[z]].sort().forEach(v=>{
                    html += `<div onclick="renderCmpVendedor('${esc(v)}')" class="glass-btn surface p-5 rounded-2xl mb-3 flex justify-between items-center" style="border-left:6px solid var(--accent)">
                        <p class="font-black uppercase text-base tracking-tight txt">${v}</p>
                        <i class="fas fa-code-compare muted"></i>
                    </div>`;
                });
            });
            document.getElementById('content-area').innerHTML = html;
        }

        function vendorPeriods(v){
            return [...new Set(db.filter(r=>r.VENDEDOR===v && r.MES && (n(r['IMPORTE NETO'])>0 || n(r['REAL ACUMULADORES'])>0)).map(r=>`${r.MES} ${r.AÑO}`))]
                .sort((a,b)=>{ const [mA,aA]=a.split(' '),[mB,aB]=b.split(' '); return aA!==aB?aB-aA:mesesRef.indexOf(mB)-mesesRef.indexOf(mA); });
        }

        function renderCmpVendedor(v){
            const periods = vendorPeriods(v);
            if(periods.length===0){ document.getElementById('content-area').innerHTML='Sin datos'; return; }
            const defA = periods[0];
            const defB = periods[1] || periods[0];
            const optsA = periods.map(p=>`<option value="${p}" ${p===defA?'selected':''}>${p}</option>`).join('');
            const optsB = periods.map(p=>`<option value="${p}" ${p===defB?'selected':''}>${p}</option>`).join('');

            let html = `
            <button onclick="renderComparativo()" class="mb-5 text-[10px] font-extrabold muted uppercase tracking-widest">← Cambiar vendedor</button>
            <div class="navy p-8 rounded-[2rem] mb-6 text-center" style="border-bottom:4px solid var(--accent)">
                <p class="text-[10px] font-black uppercase tracking-[0.3em] mb-2" style="color:var(--accent)">Comparativo de desempeño</p>
                <h2 class="text-3xl font-black uppercase text-white tracking-tight leading-none">${v}</h2>
            </div>

            <div class="surface p-5 rounded-[2rem] mb-6">
                <p class="text-[11px] font-black muted uppercase tracking-widest mb-3">Comparar mes contra mes</p>
                <div class="grid grid-cols-2 gap-3 mb-2">
                    <div>
                        <label class="text-[9px] font-black muted uppercase">Mes A</label>
                        <select id="cmp-a" onchange="updateCmp('${esc(v)}')" class="themed w-full mt-1 p-3 rounded-xl font-black text-sm">${optsA}</select>
                    </div>
                    <div>
                        <label class="text-[9px] font-black muted uppercase">Mes B</label>
                        <select id="cmp-b" onchange="updateCmp('${esc(v)}')" class="themed w-full mt-1 p-3 rounded-xl font-black text-sm">${optsB}</select>
                    </div>
                </div>
            </div>

            <div id="cmp-results"></div>

            <div class="flex items-center justify-between mt-8 mb-3">
                <p class="text-[11px] font-black muted uppercase tracking-widest">Rendimiento anual</p>
                <div class="flex gap-2">
                    <button id="am-imp" onclick="setAnnualMetric('${esc(v)}','imp')" class="chip-accent px-3 py-1.5 rounded-lg text-[10px] font-black uppercase">Importe</button>
                    <button id="am-acu" onclick="setAnnualMetric('${esc(v)}','acu')" class="surface px-3 py-1.5 rounded-lg text-[10px] font-black uppercase txt">Acumuladores</button>
                </div>
            </div>
            <div id="cmp-annual"></div>`;
            document.getElementById('content-area').innerHTML = html;
            window.scrollTo(0,0);
            annualMetric = 'imp';
            updateCmp(v);
            renderAnnual(v);
        }

        function getRow(v, periodStr){
            const [m,a] = periodStr.split(' ');
            return db.find(r => r.VENDEDOR===v && r.MES===m && r.AÑO===a) || {};
        }

        function updateCmp(v){
            const pa = document.getElementById('cmp-a').value;
            const pb = document.getElementById('cmp-b').value;
            const ra = getRow(v,pa), rb = getRow(v,pb);
            const impA = n(ra['IMPORTE NETO']), impB = n(rb['IMPORTE NETO']);

            let rows = deltaBlock('Importe Neto', impA, impB, true);
            cats.forEach(c=>{ rows += deltaBlock(c.n, n(ra[c.r]), n(rb[c.r]), false); });

            const html = `
            <div class="surface p-5 rounded-[2rem]">
                <div class="grid grid-cols-2 gap-3 mb-5">
                    <div class="cmp-cell p-4 text-center">
                        <p class="text-[9px] font-black muted uppercase mb-1">Mes A</p>
                        <p class="text-sm font-black txt">${pa}</p>
                        <p class="text-2xl font-black mt-2" style="color:var(--navy-2)">$${f(impA)}</p>
                    </div>
                    <div class="cmp-cell p-4 text-center">
                        <p class="text-[9px] font-black muted uppercase mb-1">Mes B</p>
                        <p class="text-sm font-black txt">${pb}</p>
                        <p class="text-2xl font-black mt-2" style="color:var(--navy-2)">$${f(impB)}</p>
                    </div>
                </div>
                ${rows}
            </div>`;
            document.getElementById('cmp-results').innerHTML = html;
        }

        function deltaBlock(label, a, b, money){
            const diff = a-b;
            const pct = b!==0 ? (diff/Math.abs(b))*100 : (a!==0?100:0);
            const up = diff>0, flat = diff===0;
            const col = flat?'var(--muted)':(up?'var(--good)':'var(--bad)');
            const ico = flat?'fa-minus':(up?'fa-arrow-trend-up':'fa-arrow-trend-down');
            const fmt = x => money ? '$'+f(x) : f(x);
            return `
            <div class="flex items-center justify-between py-3" style="border-top:1px solid var(--border)">
                <div class="w-1/3"><p class="text-[13px] font-black uppercase txt leading-tight">${label}</p></div>
                <div class="w-1/3 text-center"><p class="text-lg font-black txt">${fmt(a)}</p><p class="text-[10px] muted font-bold">vs ${fmt(b)}</p></div>
                <div class="w-1/3 text-right">
                    <p class="text-base font-black" style="color:${col}"><i class="fas ${ico} text-xs mr-1"></i>${diff>0?'+':''}${f(diff)}</p>
                    <p class="text-[11px] font-black" style="color:${col}">${pct>0?'+':''}${Math.round(pct)}%</p>
                </div>
            </div>`;
        }

        let annualMetric = 'imp';
        function setAnnualMetric(v, metric){
            annualMetric = metric;
            document.getElementById('am-imp').className = (metric==='imp'?'chip-accent':'surface txt')+' px-3 py-1.5 rounded-lg text-[10px] font-black uppercase';
            document.getElementById('am-acu').className = (metric==='acu'?'chip-accent':'surface txt')+' px-3 py-1.5 rounded-lg text-[10px] font-black uppercase';
            renderAnnual(v);
        }

        function renderAnnual(v){
            const years = [...new Set(db.filter(r=>r.VENDEDOR===v && r.MES).map(r=>r.AÑO))].sort((a,b)=>b-a);
            const curr = years[0], prev = years[1];
            const field = annualMetric==='imp' ? 'IMPORTE NETO' : 'REAL ACUMULADORES';
            const money = annualMetric==='imp';
            const val = (mes,anio)=>{ const row = db.find(r=>r.VENDEDOR===v && r.MES===mes && r.AÑO===anio); return row?n(row[field]):0; };

            // meses del año actual con dato
            const currVals = mesesRef.map(m=>({m, c:val(m,curr), p:prev?val(m,prev):0})).filter(x=>x.c>0 || x.p>0);
            const activos = currVals.filter(x=>x.c>0);
            const maxV = activos.length ? Math.max(...activos.map(x=>x.c)) : 0;
            const minV = activos.length ? Math.min(...activos.map(x=>x.c)) : 0;

            const ytdC = currVals.reduce((s,x)=>s+x.c,0);
            const ytdP = currVals.reduce((s,x)=>s+x.p,0);
            const ytdDiff = ytdC-ytdP;
            const ytdPct = ytdP!==0 ? (ytdDiff/Math.abs(ytdP))*100 : (ytdC!==0?100:0);
            const fmt = x => money ? '$'+f(x) : f(x);
            const good = ytdDiff>=0;

            let cells = currVals.map(x=>{
                const isHi = x.c===maxV && x.c>0;
                const isLo = x.c===minV && x.c>0 && activos.length>1;
                const d = x.c-x.p;
                const dcol = d>=0?'var(--good)':'var(--bad)';
                return `
                <div class="cmp-cell p-3 ${isHi?'cmp-hi':''} ${isLo&&!isHi?'cmp-lo':''}">
                    <div class="flex justify-between items-center mb-1">
                        <p class="text-[10px] font-black muted uppercase">${x.m.slice(0,3)}</p>
                        ${isHi?'<span class="text-[8px] font-black uppercase c-good"><i class="fas fa-star"></i> Alto</span>':''}
                        ${isLo&&!isHi?'<span class="text-[8px] font-black uppercase c-bad"><i class="fas fa-triangle-exclamation"></i> Bajo</span>':''}
                    </div>
                    <p class="text-lg font-black txt leading-tight">${fmt(x.c)}</p>
                    <p class="text-[10px] font-bold muted">${prev||''} ${prev?fmt(x.p):''}</p>
                    ${prev?`<p class="text-[10px] font-black" style="color:${dcol}">${d>=0?'+':''}${f(d)}</p>`:''}
                </div>`;
            }).join('');

            const html = `
            <div class="navy-grad p-6 rounded-[2rem] mb-4 text-white">
                <div class="flex justify-between items-center mb-2">
                    <p class="text-[10px] font-black uppercase tracking-widest" style="color:var(--accent)">Acumulado ${curr}${prev?' vs '+prev:''}</p>
                    <span class="px-3 py-1 rounded-lg text-[11px] font-black" style="background:${good?'var(--good)':'var(--bad)'};color:#fff">${ytdPct>0?'+':''}${Math.round(ytdPct)}%</span>
                </div>
                <p class="text-4xl font-black tracking-tight" style="color:var(--accent)">${fmt(ytdC)}</p>
                ${prev?`<p class="text-[12px] font-bold mt-1" style="color:#94a3b8">${prev}: ${fmt(ytdP)} · Diferencia ${ytdDiff>=0?'+':''}${fmt(ytdDiff)}</p>`:''}
            </div>
            <div class="grid grid-cols-2 gap-3 mb-4">${cells}</div>
            <p class="text-center text-[9px] font-bold muted uppercase mb-10 tracking-[0.3em]">
                <i class="fas fa-star c-good"></i> Mejor mes &nbsp;·&nbsp; <i class="fas fa-triangle-exclamation c-bad"></i> Mes más bajo
            </p>`;
            document.getElementById('cmp-annual').innerHTML = html;
        }

        /* ===================== HELPERS ===================== */
        function n(v){ if(!v) return 0; const clean=String(v).replace(/[$,]/g,"").trim(); return parseFloat(clean)||0; }
        function f(v){ return Math.round(v).toLocaleString('es-MX'); }
        function esc(s){ return String(s).replace(/'/g,"\\'"); }
        function sum(dataArr, field){ if(!field) return 0; return dataArr.reduce((acc,r)=>acc+Math.round(n(r[field])),0); }
        function toggleDropdown(id){ document.getElementById(id).classList.toggle('dropdown-active'); }
        function downloadPDF(name){
            const element = document.getElementById('pdf-container');
            html2pdf().set({ margin:[10,5,10,5], filename:`TUL_${name}.pdf`, html2canvas:{scale:2}, jsPDF:{unit:'mm',format:'a4'} }).from(element).save();
        }

        start();
    </script>
</body>
</html>
